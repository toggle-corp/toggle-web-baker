# oauth2-proxy sits in front of the console as a Traefik forward-auth target.
# It performs GitHub OAuth and restricts access to a GitHub team. It MUST FAIL
# CLOSED: any error talking to the GitHub membership API denies the request.
#
# The flags below are the security-relevant ones:
#   --provider=github
#   --github-team=toggle-corp/platform-team   restrict to this team
#   --github-org=toggle-corp                  (org gate, belt-and-suspenders)
#   --set-xauthrequest=true                   emit X-Auth-Request-User (the
#                                             header the console trusts)
#   --reverse-proxy=true                      we are behind Traefik
#   --skip-provider-button=true               go straight to GitHub
# oauth2-proxy denies by default when team membership cannot be confirmed; a
# membership-API error is an auth failure, not a pass — i.e. fail closed. Do
# NOT add --skip-auth-route / --skip-auth-regex for the console paths.
apiVersion: v1
kind: Secret
metadata:
  name: baker-oauth2-proxy
  namespace: baker-system
type: Opaque
stringData:
  # Fill these in (GitHub OAuth App). cookie-secret must be 16/24/32 bytes.
  client-id: "REPLACE_GITHUB_OAUTH_CLIENT_ID"
  client-secret: "REPLACE_GITHUB_OAUTH_CLIENT_SECRET"
  cookie-secret: "REPLACE_32_BYTE_RANDOM_BASE64"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: baker-oauth2-proxy
  namespace: baker-system
  labels: { app: baker-oauth2-proxy }
spec:
  replicas: 1
  selector:
    matchLabels: { app: baker-oauth2-proxy }
  template:
    metadata:
      labels: { app: baker-oauth2-proxy }
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
          args:
            - --http-address=0.0.0.0:4180
            - --provider=github
            - --github-org=toggle-corp
            - --github-team=toggle-corp/platform-team
            - --email-domain=*
            - --scope=user:email read:org
            - --set-xauthrequest=true
            - --pass-user-headers=true
            - --reverse-proxy=true
            - --skip-provider-button=true
            - --cookie-secure=true
            - --cookie-name=_baker_console
            # Cookie domain / redirect URL must match the public Ingress host.
            - --cookie-domain=baker-console.example.org
            - --redirect-url=https://baker-console.example.org/oauth2/callback
            - --whitelist-domain=baker-console.example.org
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom: { secretKeyRef: { name: baker-oauth2-proxy, key: client-id } }
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom: { secretKeyRef: { name: baker-oauth2-proxy, key: client-secret } }
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom: { secretKeyRef: { name: baker-oauth2-proxy, key: cookie-secret } }
          ports:
            - { name: http, containerPort: 4180 }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { cpu: 100m, memory: 64Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: baker-oauth2-proxy
  namespace: baker-system
  labels: { app: baker-oauth2-proxy }
spec:
  selector: { app: baker-oauth2-proxy }
  ports:
    - { name: http, port: 4180, targetPort: http }
