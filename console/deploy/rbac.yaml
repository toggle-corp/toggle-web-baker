# RBAC for the console. Deliberately minimal and READ-ONLY except for the
# single PATCH the "Request rebuild" button needs:
#   - get/list/watch frontendapps      (list + detail views)
#   - patch    frontendapps            (annotation-only manual rebuild)
#   - get      pods, pods/log          (deep-link the build's logsRef)
# There is intentionally NO create/delete on jobs or pods anywhere here: the
# console cannot start a build itself; it only annotates and the operator acts.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: baker-console
  namespace: baker-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: baker-console
rules:
  - apiGroups: ["baker.toggle-corp.com"]
    resources: ["frontendapps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["baker.toggle-corp.com"]
    resources: ["frontendapps"]
    # patch is the ONLY write verb the console holds (annotation rebuild).
    verbs: ["patch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get"]
  # NOTE: no rule grants create/delete on jobs, pods, or any other resource.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: baker-console
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: baker-console
subjects:
  - kind: ServiceAccount
    name: baker-console
    namespace: baker-system
