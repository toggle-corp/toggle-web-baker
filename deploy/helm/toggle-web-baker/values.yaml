# Default values for toggle-web-baker.
#
# Image tags default to the chart's appVersion (left empty below). Every image
# is published in lockstep under ghcr.io/toggle-corp/toggle-web-baker-<name>.

nameOverride: ""
fullnameOverride: ""

# Install the App CRD as part of the chart (templates/crd.yaml). The CRD
# carries helm.sh/resource-policy: keep, so `helm uninstall` will NOT delete it
# (existing App CRs survive). Set false to let a cluster-admin / GitOps
# flow own the CRD out-of-band.
crds:
  install: true

# Sentry error reporting for the operator and console binaries (one shared
# project; events are tagged component=operator|console). An empty dsn
# disables the SDK entirely. This is NOT injected into baked frontend apps.
sentry:
  dsn: ""
  environment: "production"

operator:
  replicas: 1

  image:
    repository: ghcr.io/toggle-corp/toggle-web-baker-operator
    # tag: defaults to .Chart.AppVersion when empty.
    tag: ""
    pullPolicy: IfNotPresent

  # MANDATORY. Pod + Service CIDRs EXCLUDED from build-pod egress. The operator
  # refuses to start (Ready=False) if this is empty — there is no safe default.
  # Replace with YOUR cluster's ranges (the example below is a placeholder):
  #   kubectl cluster-info dump | grep -E 'cluster-cidr|service-cluster-ip-range'
  # e.g. ["10.0.0.0/8", "172.20.0.0/16"]
  clusterCIDRs: []

  # Image-prefix allowlist for user-supplied (setup/fetch/build) images. Empty
  # fails closed at reconcile time.
  registryAllowlist: []

  # Managed node toolchain images selectable via spec.nodeVersion (keyed by node
  # MAJOR). Each resolves to an image (repository:tag, tag defaulting to the chart
  # appVersion) plus the numeric UID it runs as, so apps need not set image/
  # runAsUser. These are operator-chosen (allowlist-exempt). Add a major here — and
  # publish its image — to make it selectable; a spec.nodeVersion absent from this
  # map fails the app at reconcile. Override an entry's repository/tag to point at
  # your own build; set `home` to override the default writable HOME (/work).
  nodeImages:
    "18":
      repository: ghcr.io/toggle-corp/toggle-web-baker-node18
      tag: ""
      runAsUser: 1000
    "24":
      repository: ghcr.io/toggle-corp/toggle-web-baker-node24
      tag: ""
      runAsUser: 1000

  # Default setup (install) command per package manager, injected by the operator
  # when an app omits its setup-phase command. Keyed by package-manager name; the
  # ONLY recognised keys are yarn and pnpm (an unknown key fails the operator at
  # startup). A key omitted here falls back to the operator's compiled-in default
  # (identical to the values below), so both package managers always resolve.
  defaultSetupCommands:
    yarn: ["yarn", "install", "--frozen-lockfile"]
    pnpm: ["pnpm", "install", "--frozen-lockfile"]

  # The values below are rendered into the operator config ConfigMap
  # (templates/operator-configmap.yaml), mounted at /etc/baker/config.yaml.
  leaderElect: true
  metricsBindAddress: ":8080"
  healthProbeBindAddress: ":8081"

  # Debounce floor between post-build du storage measurements.
  measureInterval: "1h"

  # Trigger defaults for apps that enable a trigger without tuning it:
  # spec.scheduledBuilds.schedule empty -> defaultSchedule (cron);
  # spec.watchCommits.interval empty -> defaultWatchInterval (whole minutes or
  # whole hours — a CronJob schedule can't express anything finer).
  defaultSchedule: "0 */12 * * *"
  defaultWatchInterval: "10m"

  # Operator-global git credential for clone (build) + watchCommits (git
  # ls-remote polling). Anonymous GitHub throttles per source IP; an
  # authenticated token lifts clone/watch into the 5k/hr bucket. A per-App
  # `spec.repoAuth` overrides this globally for that App (host check skipped).
  #
  # The feature is OFF unless a credential is supplied (existingSecret OR
  # password). When OFF the operator keeps today's anonymous behaviour and the
  # gitAuth block is omitted from the operator ConfigMap entirely.
  #
  # Credential shape: a kubernetes.io/basic-auth Secret in the RELEASE namespace
  # with keys `username`/`password`. The operator reads it and syncs an owned,
  # drift-corrected copy into each App's namespace (Secrets don't cross
  # namespaces). Use a DEDICATED bot account and — for public repos — a classic
  # PAT with ZERO scopes: the token's only job is the authenticated rate bucket,
  # and namespace users with secret-read/pod-exec can extract the per-app copy
  # (inherent; mitigated by the zero-scope PAT). See docs/operator-security-invariants.md.
  gitAuth:
    # Repo-host allowlist. The global credential is injected ONLY when
    # spec.repo's host matches (all URL forms — https/scp/ssh — normalized in
    # the operator). A user-controlled spec.repo pointing off-allowlist stays
    # anonymous, so the token can't be harvested by `repo: https://evil.com/…`.
    # NOTE: only github.com ssh/scp URLs are rewritten to https:// — for any
    # OTHER host added here, spec.repo must be written in https:// form or the
    # token credential won't be applied. Must be non-empty whenever the feature
    # is enabled (existingSecret or password); empty/null is a template-time fail.
    hosts: ["github.com"]

    # Path A (recommended, ESO / external-secrets): reference a Secret you (or
    # External Secrets Operator) pre-create in the release namespace, keys
    # username/password. The chart does NOT create or template the credential.
    existingSecret: ""

    # Path B (sops + helmfile): the chart creates the basic-auth Secret from
    # these values. Secret values are NEVER rendered into the ConfigMap — only
    # the resulting Secret name is passed to the operator.
    #
    # existingSecret and password are MUTUALLY EXCLUSIVE — setting both is a
    # template-time `fail`. Silent precedence would let a stale sops password
    # linger while ESO owns the real credential; failing loudly forces the
    # operator to pick one owner. username and password must BOTH be set or BOTH
    # empty: username-only is a fail (feature would silently render OFF, staying
    # anonymous) and password-only is a fail (empty-username Secret the operator
    # rejects at startup → CrashLoopBackOff). All mirror the operator's
    # fail-closed LoadConfig.
    username: ""
    password: ""

  # Per-phase build-pod resource defaults (operator-owned). memory is per-phase
  # (a phase's spec.pipeline.phases.<phase>.memoryLimit overrides its ceiling; request is pinned
  # == limit); cpu request/limit are global (same for every phase container).
  phaseResources:
    cpu: { request: "0.1", limit: "4" }
    memory: { setup: 512Mi, fetch: 512Mi, build: 2Gi }   # fetch may be raised if it downloads large data

  # Default deadline bounding the whole build Job when spec.pipeline.timeout is unset.
  activeDeadlineSeconds: 1800

  # WaitForFirstConsumer StorageClass backing all PVCs. Empty => cluster default.
  storageClass: ""
  # Namespace of the Traefik controller (used for the nginx-ingress NetworkPolicy).
  traefikNamespace: traefik
  # API group of the Traefik Middleware CRD (older clusters: traefik.containo.us).
  traefikGroup: traefik.io
  # imagePullSecret stamped onto every platform pod the operator creates.
  imagePullSecret: ""

  resources:
    requests: { cpu: 10m, memory: 64Mi }
    limits: { cpu: 500m, memory: 256Mi }

# Platform helper images the operator stamps onto the pods it creates.
#
# NOTE: referenced by TAG (repository:appVersion) for now, NOT by digest. This
# deliberately relaxes the "digest-pinned, no user override" platform-image
# invariant (docs/operator-security-invariants.md) in exchange for a simpler
# lockstep release. Harden later by resolving tag->digest in CI.
# clone/copier/du/cleanup/clock tags default to .Chart.AppVersion when empty.
platformImages:
  clone:
    repository: ghcr.io/toggle-corp/toggle-web-baker-clone
    tag: ""
  copier:
    repository: ghcr.io/toggle-corp/toggle-web-baker-copier
    tag: ""
  du:
    repository: ghcr.io/toggle-corp/toggle-web-baker-du
    tag: ""
  cleanup:
    repository: ghcr.io/toggle-corp/toggle-web-baker-cleanup
    tag: ""
  clock:
    repository: ghcr.io/toggle-corp/toggle-web-baker-clock
    tag: ""
  shim:
    repository: ghcr.io/toggle-corp/toggle-web-baker-shim
    tag: ""
  # External images — pinned independently of the chart version.
  nginx: docker.io/nginxinc/nginx-unprivileged:1.27-alpine

# Read-only admin console + its oauth2-proxy + Traefik ingress. Opt-in.
console:
  enabled: false

  image:
    repository: ghcr.io/toggle-corp/toggle-web-baker-console
    # tag: defaults to .Chart.AppVersion when empty.
    tag: ""
    pullPolicy: IfNotPresent

  # Public host for the console and oauth2-proxy redirect/cookie domain.
  host: baker-console.example.org
  tlsSecretName: baker-console-tls

  resources:
    requests: { cpu: 10m, memory: 32Mi }
    limits: { cpu: 200m, memory: 128Mi }

  ingress:
    enabled: true
    entrypoint: websecure

  # Loki wiring for the build-log viewer. When url is empty the console falls
  # back to live/retained build pods (it can get, but not list, pods). All
  # fields are optional and only rendered into the Deployment env when set.
  #
  # NOTE: bearerToken / basicAuthPass are passed via plain values here for now
  # (non-secret-ish; the console only reads build logs). If your Loki token is
  # sensitive, mount it via an existing Secret + envFrom instead.
  loki:
    url: ""           # Loki base URL, no path (e.g. http://loki.monitoring:3100)
    tenantId: ""      # X-Scope-OrgID for multi-tenant Loki
    basicAuthUser: ""
    basicAuthPass: ""
    bearerToken: ""

  oauth2Proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    githubOrg: toggle-corp
    githubTeam: toggle-corp/platform-team

    # If existingSecret is set, the chart references it and does NOT create a
    # Secret (recommended — keeps OAuth credentials out of values/Helm release).
    # The secret must hold keys: client-id, client-secret, cookie-secret.
    existingSecret: ""
    # Used ONLY when existingSecret is empty (the chart then creates the Secret).
    # cookieSecret must be 16/24/32 bytes.
    clientId: ""
    clientSecret: ""
    cookieSecret: ""

    resources:
      requests: { cpu: 10m, memory: 32Mi }
      limits: { cpu: 100m, memory: 64Mi }

# Prometheus Operator integration (ServiceMonitor + PrometheusRule for the
# operator's baker_app_* metrics on :8080). Opt-in; requires the
# monitoring.coreos.com CRDs (e.g. kube-prometheus-stack) on the cluster.
monitoring:
  enabled: false

  # Extra labels stamped onto the ServiceMonitor and PrometheusRule so your
  # Prometheus instance discovers them (match its serviceMonitorSelector /
  # ruleSelector), e.g. { release: kube-prometheus-stack }.
  labels: {}

  alerts:
    # Static labels merged into every alert rule's labels (next to severity),
    # e.g. { team: platform } for Alertmanager routing.
    extraLabels: {}
    # How long an app must stay Degraded before AppDegraded fires.
    degradedFor: 5m
    # How long an app may sit in AwaitingFirstBuild before AppNeverReady fires.
    neverReadyFor: 1h
    # Slack past the build deadline before AppBuildStuck fires (the
    # operator normally aborts at the deadline; firing means it did not).
    # Prometheus duration (e.g. 90s/10m/1h), used as the rule's `for:` —
    # same syntax as degradedFor/neverReadyFor.
    stuckBuildGrace: 10m
