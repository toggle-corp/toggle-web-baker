# Console enabled, referencing an existing oauth2 secret (so no Secret with
# credentials is rendered into the snapshot).
operator:
  clusterCIDRs:
    - 10.0.0.0/8
sentry:
  dsn: "https://key@o0.ingest.example.sentry.io/1"
  environment: "staging"
console:
  enabled: true
  host: baker-console.example.org
  loki:
    url: http://loki.monitoring.svc:3100
    tenantId: baker
  oauth2Proxy:
    existingSecret: baker-oauth2-proxy
