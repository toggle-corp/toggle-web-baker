# promtool unit tests for the chart's PrometheusRule alerts
# (templates/app-prometheusrule.yaml). Run via `just alert-rules-test`,
# which renders the chart with monitoring.enabled=true, extracts .spec.groups
# into rules.yaml next to a copy of this file, and runs `promtool test rules`.
#
# NOTE: promtool evaluates time() as the test's eval timestamp, which starts at
# Unix epoch 0 — so baker_app_build_running_since_seconds fixtures are tiny
# absolute values (a build "started at t=60s" is just 60).
#
# NOTE: promtool compares annotations even when exp_annotations is omitted (an
# omitted block means "expect NO annotations" and fails), so every firing
# expectation carries the full annotation set.
rule_files:
  - rules.yaml

evaluation_interval: 1m

tests:
  # --- AppBuildStuck -------------------------------------------------
  # deadline 1800s, `for:` = 10m chart-default grace. A build started at t=60s
  # crosses the deadline when time() - 60 > 1800, i.e. first true at eval 32m;
  # the alert then fires once the condition has held for 10m, at 42m.
  - interval: 1m
    input_series:
      - series: 'baker_app_build_running_since_seconds{namespace="default", name="stuck-app"}'
        values: '60x60'
      - series: 'baker_app_build_deadline_seconds{namespace="default", name="stuck-app"}'
        values: '1800x60'
      # Idle app: running_since 0 must never fire, even though
      # time() - 0 > deadline holds (the `> 0` guard blocks it).
      - series: 'baker_app_build_running_since_seconds{namespace="default", name="idle-app"}'
        values: '0x60'
      - series: 'baker_app_build_deadline_seconds{namespace="default", name="idle-app"}'
        values: '1800x60'
    alert_rule_test:
      # 40m: past the deadline (pending) but the 10m `for:` not yet satisfied.
      - eval_time: 40m
        alertname: AppBuildStuck
        exp_alerts: []
      # 42m: condition held 10m past the deadline crossing — fires (idle-app
      # stays silent).
      - eval_time: 42m
        alertname: AppBuildStuck
        exp_alerts:
          - exp_labels:
              severity: warning
              namespace: default
              name: stuck-app
            exp_annotations:
              summary: "App default/stuck-app build stuck past its deadline"
              description: "App default/stuck-app has had a build running past its deadline for over 10m — the operator should have aborted it by now. Inspect the build Job/pod and the operator logs."

  # --- AppStorageThreshold -------------------------------------------
  - interval: 1m
    input_series:
      # cache: used > alertBytes — must fire after the 15m `for:`.
      - series: 'baker_app_storage_used_bytes{namespace="default", name="web", volume="cache"}'
        values: '2000000000x30'
      - series: 'baker_app_storage_alert_bytes{namespace="default", name="web", volume="cache"}'
        values: '1000000000x30'
      # output: used < alertBytes — must not fire.
      - series: 'baker_app_storage_used_bytes{namespace="default", name="web", volume="output"}'
        values: '500000000x30'
      - series: 'baker_app_storage_alert_bytes{namespace="default", name="web", volume="output"}'
        values: '1000000000x30'
      # outputTotal: used_bytes present but NO alert_bytes series (thresholds
      # are opt-in; the one-to-one vector match must drop it, not fire).
      - series: 'baker_app_storage_used_bytes{namespace="default", name="web", volume="outputTotal"}'
        values: '9000000000x30'
    alert_rule_test:
      # 10m: over threshold but `for: 15m` not yet satisfied.
      - eval_time: 10m
        alertname: AppStorageThreshold
        exp_alerts: []
      # 16m: sustained past `for:` — only the cache volume fires.
      - eval_time: 16m
        alertname: AppStorageThreshold
        exp_alerts:
          - exp_labels:
              severity: warning
              namespace: default
              name: web
              volume: cache
            exp_annotations:
              summary: "App default/web volume cache over its alert threshold"
              description: "App default/web is using 1.863GiB on volume cache, above its configured alertBytes threshold. Grow the volume or prune its contents."

  # --- AppDegraded ---------------------------------------------------
  # `max without (reason)` drops reason from the alert identity, so the fired
  # alert carries only namespace/name (+severity).
  - interval: 1m
    input_series:
      - series: 'baker_app_degraded{namespace="default", name="degraded-app", reason="BuildFailed"}'
        values: '1x30'
      # Healthy app exports 0 with reason="" — must never fire.
      - series: 'baker_app_degraded{namespace="default", name="healthy-app", reason=""}'
        values: '0x30'
    alert_rule_test:
      # 3m: degraded, but `for: 5m` (chart default) not yet satisfied.
      - eval_time: 3m
        alertname: AppDegraded
        exp_alerts: []
      # 6m: sustained — fires critical, without a reason label (the annotation
      # routes the responder to the CR's status conditions instead).
      - eval_time: 6m
        alertname: AppDegraded
        exp_alerts:
          - exp_labels:
              severity: critical
              namespace: default
              name: degraded-app
            exp_annotations:
              summary: "App default/degraded-app is Degraded"
              description: "App default/degraded-app has been Degraded. Inspect the CR's status conditions for the reason and the latest build history entry for details."

  # --- AppDegraded: reason churn -------------------------------------
  # A mid-incident reason flip (the operator deletes the old reason series and
  # writes a new one) must NOT reset the `for:` timer: the alert identity
  # excludes reason, so the aggregate stays 1 across the flip and fires on
  # schedule.
  - interval: 1m
    input_series:
      - series: 'baker_app_degraded{namespace="default", name="churn-app", reason="BuildFailed"}'
        values: '1 1 1 1 stale'
      - series: 'baker_app_degraded{namespace="default", name="churn-app", reason="OOMKilled"}'
        values: '_ _ _ _ 1x26'
    alert_rule_test:
      # 6m: degraded continuously for 6m despite the reason flip at 4m — fires.
      - eval_time: 6m
        alertname: AppDegraded
        exp_alerts:
          - exp_labels:
              severity: critical
              namespace: default
              name: churn-app
            exp_annotations:
              summary: "App default/churn-app is Degraded"
              description: "App default/churn-app has been Degraded. Inspect the CR's status conditions for the reason and the latest build history entry for details."

  # --- AppBuildFailed ------------------------------------------------
  # Proves the operator's counter pre-seed matters: `increase()` needs to SEE
  # the 0→1 step inside its range window. A pre-seeded series (born at 0) fires
  # on the first failure; a series born directly at 1 (no pre-seed) shows no
  # increase — the first failure of that app would be silent.
  - interval: 1m
    input_series:
      - series: 'baker_app_builds_total{namespace="default", name="seeded", result="Failed"}'
        values: '0x5 1x14'
      - series: 'baker_app_builds_total{namespace="default", name="unseeded", result="Failed"}'
        values: '_x5 1x14'
    alert_rule_test:
      # 7m: seeded stepped 0→1 at 6m — fires. unseeded was born at 1 with no
      # 0 sample in the window — increase()==0, does NOT fire (this is exactly
      # why the operator pre-seeds counters at 0).
      - eval_time: 7m
        alertname: AppBuildFailed
        exp_alerts:
          - exp_labels:
              severity: warning
              namespace: default
              name: seeded
              result: Failed
            exp_annotations:
              summary: "App default/seeded build failed"
              description: "A build for App default/seeded finished as Failed within the last 10 minutes. Check the build logs and status.buildHistory for the failing step."
      # 18m: the step left the 10m window — quiet again.
      - eval_time: 18m
        alertname: AppBuildFailed
        exp_alerts: []

  # --- AppBuildOOMKilled ----------------------------------------------
  # Same pre-seed proof for the per-step OOM counter.
  - interval: 1m
    input_series:
      - series: 'baker_app_build_oom_total{namespace="default", name="seeded", step="build"}'
        values: '0x5 1x14'
      - series: 'baker_app_build_oom_total{namespace="default", name="unseeded", step="build"}'
        values: '_x5 1x14'
    alert_rule_test:
      - eval_time: 7m
        alertname: AppBuildOOMKilled
        exp_alerts:
          - exp_labels:
              severity: warning
              namespace: default
              name: seeded
              step: build
            exp_annotations:
              summary: "App default/seeded build OOMKilled in step build"
              description: "A build for App default/seeded was OOMKilled in the build step within the last 10 minutes. Raise spec.pipeline.phases.build.memoryLimit (or the operator's per-phase default)."
      - eval_time: 18m
        alertname: AppBuildOOMKilled
        exp_alerts: []
