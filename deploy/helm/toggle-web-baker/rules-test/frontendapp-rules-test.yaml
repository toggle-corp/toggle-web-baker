# promtool unit tests for the chart's PrometheusRule alerts
# (templates/frontendapp-prometheusrule.yaml). Run via `just alert-rules-test`,
# which renders the chart with monitoring.enabled=true, extracts .spec.groups
# into rules.yaml next to a copy of this file, and runs `promtool test rules`.
#
# NOTE: promtool evaluates time() as the test's eval timestamp, which starts at
# Unix epoch 0 — so frontendapp_build_running_since_seconds fixtures are tiny
# absolute values (a build "started at t=60s" is just 60).
rule_files:
  - rules.yaml

evaluation_interval: 1m

tests:
  # --- FrontendAppBuildStuck -------------------------------------------------
  # deadline 1800s + 600s chart-default grace: a build started at t=60s crosses
  # the threshold when time() - 60 > 2400, i.e. strictly after eval time 41m.
  - interval: 1m
    input_series:
      - series: 'frontendapp_build_running_since_seconds{namespace="default", name="stuck-app"}'
        values: '60x60'
      - series: 'frontendapp_build_deadline_seconds{namespace="default", name="stuck-app"}'
        values: '1800x60'
      # Idle app: running_since 0 must never fire, even though
      # time() - 0 > deadline + grace holds (the `> 0` guard blocks it).
      - series: 'frontendapp_build_running_since_seconds{namespace="default", name="idle-app"}'
        values: '0x60'
      - series: 'frontendapp_build_deadline_seconds{namespace="default", name="idle-app"}'
        values: '1800x60'
    alert_rule_test:
      # 40m: elapsed 2340s < 2400s — below deadline+grace, no alert.
      - eval_time: 40m
        alertname: FrontendAppBuildStuck
        exp_alerts: []
      # 42m: elapsed 2460s > 2400s — fires (idle-app stays silent).
      - eval_time: 42m
        alertname: FrontendAppBuildStuck
        exp_alerts:
          - exp_labels:
              severity: warning
              namespace: default
              name: stuck-app
            exp_annotations:
              summary: "FrontendApp default/stuck-app build stuck past its deadline"
              description: "FrontendApp default/stuck-app has had a build running for more than its deadline plus 10m grace — the operator should have aborted it by now. Inspect the build Job/pod and the operator logs."

  # --- FrontendAppStorageThreshold -------------------------------------------
  - interval: 1m
    input_series:
      # cache: used > alertBytes — must fire after the 15m `for:`.
      - series: 'frontendapp_storage_used_bytes{namespace="default", name="web", volume="cache"}'
        values: '2000000000x30'
      - series: 'frontendapp_storage_alert_bytes{namespace="default", name="web", volume="cache"}'
        values: '1000000000x30'
      # output: used < alertBytes — must not fire.
      - series: 'frontendapp_storage_used_bytes{namespace="default", name="web", volume="output"}'
        values: '500000000x30'
      - series: 'frontendapp_storage_alert_bytes{namespace="default", name="web", volume="output"}'
        values: '1000000000x30'
      # outputTotal: used_bytes present but NO alert_bytes series (thresholds
      # are opt-in; the one-to-one vector match must drop it, not fire).
      - series: 'frontendapp_storage_used_bytes{namespace="default", name="web", volume="outputTotal"}'
        values: '9000000000x30'
    alert_rule_test:
      # 10m: over threshold but `for: 15m` not yet satisfied.
      - eval_time: 10m
        alertname: FrontendAppStorageThreshold
        exp_alerts: []
      # 16m: sustained past `for:` — only the cache volume fires.
      - eval_time: 16m
        alertname: FrontendAppStorageThreshold
        exp_alerts:
          - exp_labels:
              severity: warning
              namespace: default
              name: web
              volume: cache
            exp_annotations:
              summary: "FrontendApp default/web volume cache over its alert threshold"
              description: "FrontendApp default/web is using 1.863GiB on volume cache, above its configured alertBytes threshold. Grow the volume or prune its contents."

  # --- FrontendAppDegraded ---------------------------------------------------
  - interval: 1m
    input_series:
      - series: 'frontendapp_degraded{namespace="default", name="degraded-app", reason="BuildFailed"}'
        values: '1x30'
      # Healthy app exports 0 with reason="" — must never fire.
      - series: 'frontendapp_degraded{namespace="default", name="healthy-app", reason=""}'
        values: '0x30'
    alert_rule_test:
      # 3m: degraded, but `for: 5m` (chart default) not yet satisfied.
      - eval_time: 3m
        alertname: FrontendAppDegraded
        exp_alerts: []
      # 6m: sustained — fires critical, with the condition reason surfaced both
      # as a label and in the annotations.
      - eval_time: 6m
        alertname: FrontendAppDegraded
        exp_alerts:
          - exp_labels:
              severity: critical
              namespace: default
              name: degraded-app
              reason: BuildFailed
            exp_annotations:
              summary: "FrontendApp default/degraded-app is Degraded (BuildFailed)"
              description: "FrontendApp default/degraded-app has been Degraded with reason BuildFailed. Inspect the CR status conditions and the latest build history entry for details."
