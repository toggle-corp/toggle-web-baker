apiVersion: v2
# Chart name doubles as the OCI repo segment on `helm push`, so the artifact
# publishes to ghcr.io/toggle-corp/toggle-web-baker-helm. Resource names are
# decoupled from this via the "toggle-web-baker.name" helper (literal base), so
# they stay <release>-toggle-web-baker-* regardless of the -helm suffix.
name: toggle-web-baker-helm
description: |
  The FrontendApp deploy-platform operator (baker.toggle-corp.com) plus an
  optional read-only admin console. Installs the CRD, operator RBAC, and the
  operator Deployment; the console stack is opt-in via console.enabled.
type: application

# version (chart) and appVersion (operator/console/helper image tags) move in
# lockstep with the git tag. release.sh's custom hook rewrites BOTH on release;
# the 0.0.0 placeholder here is what an un-released working tree renders.
version: 0.1.0-dev8
appVersion: "0.1.0-dev8"

home: https://github.com/toggle-corp/toggle-web-baker
sources:
  - https://github.com/toggle-corp/toggle-web-baker
maintainers:
  - name: toggle-corp
