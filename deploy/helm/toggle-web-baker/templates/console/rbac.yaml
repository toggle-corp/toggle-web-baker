{{- if .Values.console.enabled }}
# RBAC for the console: READ-ONLY except the single annotation PATCH the
# "Request rebuild" button needs. No create/delete on jobs or pods anywhere.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "toggle-web-baker.console.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "toggle-web-baker.labels" . | nindent 4 }}
    app.kubernetes.io/component: console
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "toggle-web-baker.console.fullname" . }}
  labels:
    {{- include "toggle-web-baker.labels" . | nindent 4 }}
    app.kubernetes.io/component: console
rules:
  - apiGroups: ["baker.toggle-corp.com"]
    resources: ["frontendapps"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get"]
  # Live build usage is read from the kubelet summary API via the apiserver
  # node proxy (GET /api/v1/nodes/<node>/proxy/stats/summary). metrics.k8s.io
  # cannot serve build pods: their steps run as initContainers, for which
  # metrics-server publishes nothing while the pod is in its init phase.
  # GET-only is deliberate — exec/attach/port-forward through the kubelet
  # require create on nodes/proxy, which stays ungranted.
  - apiGroups: [""]
    resources: ["nodes/proxy"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "toggle-web-baker.console.fullname" . }}
  labels:
    {{- include "toggle-web-baker.labels" . | nindent 4 }}
    app.kubernetes.io/component: console
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "toggle-web-baker.console.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "toggle-web-baker.console.fullname" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
