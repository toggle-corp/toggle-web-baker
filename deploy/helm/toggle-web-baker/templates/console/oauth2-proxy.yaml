{{- if .Values.console.enabled }}
{{- $oauth := .Values.console.oauth2Proxy }}
{{- $secretName := $oauth.existingSecret | default (include "toggle-web-baker.oauth2.fullname" .) }}
# oauth2-proxy: GitHub OAuth reverse proxy in front of the console. Unauthenticated
# requests natively 302-redirect to GitHub login; authenticated requests are proxied
# to the console upstream. MUST FAIL CLOSED — any error confirming team membership
# denies the request.
{{- if not $oauth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "toggle-web-baker.oauth2.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "toggle-web-baker.labels" . | nindent 4 }}
    app.kubernetes.io/component: oauth2-proxy
type: Opaque
stringData:
  client-id: {{ $oauth.clientId | quote }}
  client-secret: {{ $oauth.clientSecret | quote }}
  cookie-secret: {{ $oauth.cookieSecret | quote }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "toggle-web-baker.oauth2.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "toggle-web-baker.labels" . | nindent 4 }}
    app.kubernetes.io/component: oauth2-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "toggle-web-baker.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: oauth2-proxy
  template:
    metadata:
      labels:
        {{- include "toggle-web-baker.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: oauth2-proxy
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: oauth2-proxy
          image: {{ $oauth.image }}
          args:
            - --http-address=0.0.0.0:4180
            - --provider=github
            - --github-org={{ $oauth.githubOrg }}
            - --github-team={{ $oauth.githubTeam }}
            - --email-domain=*
            - --scope=user:email read:org
            - --pass-user-headers=true
            - --reverse-proxy=true
            - --skip-provider-button=true
            - --cookie-secure=true
            - --cookie-name=_baker_console
            - --cookie-domain={{ .Values.console.host }}
            - --redirect-url=https://{{ .Values.console.host }}/oauth2/callback
            - --whitelist-domain={{ .Values.console.host }}
            - --upstream=http://{{ include "toggle-web-baker.console.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:80
            {{- /* Public skip-auth routes (no GitHub auth): the signed-out landing
                   page, and /healthz so external uptime monitors can reach it. */}}
            - --skip-auth-route=GET=^/signed-out$
            - --skip-auth-route=GET=^/healthz$
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom: { secretKeyRef: { name: {{ $secretName }}, key: client-id } }
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom: { secretKeyRef: { name: {{ $secretName }}, key: client-secret } }
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom: { secretKeyRef: { name: {{ $secretName }}, key: cookie-secret } }
          ports:
            - { name: http, containerPort: 4180 }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml $oauth.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "toggle-web-baker.oauth2.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "toggle-web-baker.labels" . | nindent 4 }}
    app.kubernetes.io/component: oauth2-proxy
spec:
  selector:
    {{- include "toggle-web-baker.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: oauth2-proxy
  ports:
    - { name: http, port: 4180, targetPort: http }
{{- end }}
