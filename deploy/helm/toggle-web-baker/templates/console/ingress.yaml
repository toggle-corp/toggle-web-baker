{{- if .Values.console.enabled }}
{{- if .Values.console.ingress.enabled }}
{{- $entrypoint := .Values.console.ingress.entrypoint }}
{{- $host := .Values.console.host }}
# Single Ingress: all traffic for the console host reaches oauth2-proxy, which
# serves /oauth2/* itself (login + callback) and reverse-proxies every other
# request to the console upstream. Unauthenticated hits natively 302 to GitHub.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "toggle-web-baker.console.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "toggle-web-baker.labels" . | nindent 4 }}
    app.kubernetes.io/component: console
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: {{ $entrypoint }}
spec:
  rules:
    - host: {{ $host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "toggle-web-baker.oauth2.fullname" . }}
                port: { number: 4180 }
  tls:
    - hosts: [{{ $host }}]
      secretName: {{ .Values.console.tlsSecretName }}
{{- end }}
{{- end }}
