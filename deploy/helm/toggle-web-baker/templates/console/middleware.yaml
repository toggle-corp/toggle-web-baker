{{- if .Values.console.enabled }}
{{- if .Values.console.ingress.enabled }}
# Traefik forward-auth Middleware: every console request is first sent to
# oauth2-proxy's /oauth2/auth. A 2xx passes (copying X-Auth-Request-* headers
# onto the upstream); anything else redirects to login. oauth2-proxy fails
# closed, so a GitHub outage denies access rather than opening it.
apiVersion: {{ .Values.operator.traefikGroup }}/v1alpha1
kind: Middleware
metadata:
  name: {{ include "toggle-web-baker.console.fullname" . }}-auth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "toggle-web-baker.labels" . | nindent 4 }}
    app.kubernetes.io/component: console
spec:
  forwardAuth:
    address: http://{{ include "toggle-web-baker.oauth2.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:4180/oauth2/auth
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - X-Auth-Request-Preferred-Username
{{- end }}
{{- end }}
