apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "toggle-web-baker.operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "toggle-web-baker.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
spec:
  replicas: {{ .Values.operator.replicas }}
  selector:
    matchLabels:
      {{- include "toggle-web-baker.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: operator
  template:
    metadata:
      annotations:
        # Roll the operator pod whenever the config ConfigMap content changes.
        checksum/config: {{ include (print $.Template.BasePath "/operator-configmap.yaml") . | sha256sum }}
      labels:
        {{- include "toggle-web-baker.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: operator
    spec:
      serviceAccountName: {{ include "toggle-web-baker.operator.fullname" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: {{ include "toggle-web-baker.image" (dict "image" .Values.operator.image "root" $) }}
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          args:
            - --config=/etc/baker/config.yaml
          volumeMounts:
            - { name: config, mountPath: /etc/baker, readOnly: true }
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
      volumes:
        - { name: config, configMap: { name: {{ include "toggle-web-baker.operator.fullname" . }}-config } }
