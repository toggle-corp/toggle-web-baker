{{- /*
Git credential Secret for clone + watchCommits, created ONLY on the
from-values (sops+helmfile) path — i.e. operator.gitAuth.password is set and
existingSecret is empty. On the ESO path (existingSecret set) the chart
references that Secret and creates nothing here.

The include below also enforces the existingSecret/password mutual exclusion
(fail), so `--set gitAuth.password=x --set gitAuth.existingSecret=y` fails even
though this template's own guard would otherwise skip it.

Keys username/password match the mounted GIT_CREDENTIAL_DIR/{username,password}
convention (images/clone/README.md, images/clock/README.md). Values are NEVER
rendered into the operator ConfigMap — only the Secret name is passed through.
*/ -}}
{{- if include "toggle-web-baker.gitAuth.enabled" . -}}
{{- if not .Values.operator.gitAuth.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "toggle-web-baker.gitCredential.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "toggle-web-baker.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
type: kubernetes.io/basic-auth
stringData:
  username: {{ .Values.operator.gitAuth.username | quote }}
  password: {{ .Values.operator.gitAuth.password | quote }}
{{- end }}
{{- end }}
