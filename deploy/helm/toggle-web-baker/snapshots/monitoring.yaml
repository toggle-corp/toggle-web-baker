          labels:
            severity: critical
            team: platform
          annotations:
            summary: "FrontendApp {{ $labels.namespace }}/{{ $labels.name }} is Degraded"
            description: "FrontendApp {{ $labels.namespace }}/{{ $labels.name }} has been Degraded. Inspect the CR's status conditions for the reason and the latest build history entry for details."
        - alert: FrontendAppBuildFailed
          expr: increase(frontendapp_builds_total{result="Failed"}[10m]) > 0
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "FrontendApp {{ $labels.namespace }}/{{ $labels.name }} build failed"
            description: "A build for FrontendApp {{ $labels.namespace }}/{{ $labels.name }} finished as Failed within the last 10 minutes. Check the build logs and status.buildHistory for the failing step."
        - alert: FrontendAppBuildOOMKilled
          expr: increase(frontendapp_build_oom_total[10m]) > 0
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "FrontendApp {{ $labels.namespace }}/{{ $labels.name }} build OOMKilled in step {{ $labels.step }}"
            description: "A build for FrontendApp {{ $labels.namespace }}/{{ $labels.name }} was OOMKilled in the {{ $labels.step }} step within the last 10 minutes. Raise spec.pipeline.phases.{{ $labels.step }}.memoryLimit (or the operator's per-phase default)."
        - alert: FrontendAppStorageThreshold
          expr: frontendapp_storage_used_bytes > frontendapp_storage_alert_bytes
          for: 15m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "FrontendApp {{ $labels.namespace }}/{{ $labels.name }} volume {{ $labels.volume }} over its alert threshold"
            description: "FrontendApp {{ $labels.namespace }}/{{ $labels.name }} is using {{ $value | humanize1024 }}B on volume {{ $labels.volume }}, above its configured alertBytes threshold. Grow the volume or prune its contents."
        - alert: FrontendAppBuildStuck
          expr: (time() - frontendapp_build_running_since_seconds > frontendapp_build_deadline_seconds) and frontendapp_build_running_since_seconds > 0
          for: 10m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "FrontendApp {{ $labels.namespace }}/{{ $labels.name }} build stuck past its deadline"
            description: "FrontendApp {{ $labels.namespace }}/{{ $labels.name }} has had a build running past its deadline for over 10m — the operator should have aborted it by now. Inspect the build Job/pod and the operator logs."
        - alert: FrontendAppNeverReady
          expr: frontendapp_phase{phase="AwaitingFirstBuild"} == 1
          for: 1h
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "FrontendApp {{ $labels.namespace }}/{{ $labels.name }} has never become Ready"
            description: "FrontendApp {{ $labels.namespace }}/{{ $labels.name }} has been AwaitingFirstBuild for over 1h without a successful first build. Check whether builds are starting (webhook/schedule) and why they are not succeeding."

---
# Source: toggle-web-baker-helm/templates/operator-servicemonitor.yaml
# Scrapes the operator's plain-HTTP /metrics on :8080 (cmd/main.go uses no
# secure-serving/authn filter) via the operator-metrics Service. Requires the
# monitoring.coreos.com CRDs; monitoring.labels must match your Prometheus
# serviceMonitorSelector (e.g. release: kube-prometheus-stack).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: release-name-toggle-web-baker-operator
  namespace: default
  labels:
    helm.sh/chart: toggle-web-baker-helm-0.0.0
    app.kubernetes.io/name: toggle-web-baker
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "0.0.0"
    app.kubernetes.io/managed-by: Helm
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: toggle-web-baker
      app.kubernetes.io/instance: release-name
      app.kubernetes.io/component: operator-metrics
  endpoints:
    - port: metrics
      path: /metrics
      # The frontendapp_* series carry their own namespace/name labels (the
      # CR's identity); they must win over the scrape target's labels.
      honorLabels: true
