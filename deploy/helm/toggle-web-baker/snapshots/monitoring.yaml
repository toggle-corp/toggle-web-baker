# Alert rules over the operator's frontendapp_* metrics. monitoring.labels
# must match your Prometheus ruleSelector (e.g. release: kube-prometheus-stack).
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: release-name-toggle-web-baker-frontendapp
  namespace: default
  labels:
    helm.sh/chart: toggle-web-baker-helm-0.0.0
    app.kubernetes.io/name: toggle-web-baker
