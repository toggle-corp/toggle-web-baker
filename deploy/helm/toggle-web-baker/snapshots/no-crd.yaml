# Source: toggle-web-baker-helm/templates/operator-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-name-toggle-web-baker-operator
  namespace: default
  labels:
    helm.sh/chart: toggle-web-baker-helm-0.0.0
    app.kubernetes.io/name: toggle-web-baker
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "0.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: toggle-web-baker
      app.kubernetes.io/instance: release-name
      app.kubernetes.io/component: operator
  template:
    metadata:
      annotations:
        # Roll the operator pod whenever the config ConfigMap content changes.
        checksum/config: f44a48b4fc0205ca93d3dfca65718c27696c2fa74f3a3ba242489e3fa12e9a5d
      labels:
        app.kubernetes.io/name: toggle-web-baker
        app.kubernetes.io/instance: release-name
        app.kubernetes.io/component: operator
    spec:
      serviceAccountName: release-name-toggle-web-baker-operator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: ghcr.io/toggle-corp/toggle-web-baker-operator:0.0.0
          imagePullPolicy: IfNotPresent
          args:
            - --config=/etc/baker/config.yaml
          volumeMounts:
            - { name: config, mountPath: /etc/baker, readOnly: true }
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 10m
              memory: 64Mi
      volumes:
        - { name: config, configMap: { name: release-name-toggle-web-baker-operator-config } }
