# Source: toggle-web-baker-helm/templates/operator-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-name-toggle-web-baker-operator
  namespace: default
  labels:
    helm.sh/chart: toggle-web-baker-helm-0.0.0
    app.kubernetes.io/name: toggle-web-baker
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "0.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: toggle-web-baker
      app.kubernetes.io/instance: release-name
      app.kubernetes.io/component: operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: toggle-web-baker
        app.kubernetes.io/instance: release-name
        app.kubernetes.io/component: operator
    spec:
      serviceAccountName: release-name-toggle-web-baker-operator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: ghcr.io/toggle-corp/toggle-web-baker-operator:0.0.0
          imagePullPolicy: IfNotPresent
          args:
            - --leader-elect=true
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
            - --cluster-cidrs=10.0.0.0/8
            - --traefik-namespace=traefik
            - --traefik-group=traefik.io
            - --image-clone=ghcr.io/toggle-corp/toggle-web-baker-clone:0.0.0
            - --image-copier=ghcr.io/toggle-corp/toggle-web-baker-copier:0.0.0
            - --image-du=ghcr.io/toggle-corp/toggle-web-baker-du:0.0.0
            - --image-cleanup=ghcr.io/toggle-corp/toggle-web-baker-cleanup:0.0.0
            - --image-clock=ghcr.io/toggle-corp/toggle-web-baker-clock:0.0.0
            - --image-nginx=docker.io/nginxinc/nginx-unprivileged:1.27-alpine
            - '--node-images={"18":{"image":"ghcr.io/toggle-corp/toggle-web-baker-node18:0.0.0","runAsUser":1000},"24":{"image":"ghcr.io/toggle-corp/toggle-web-baker-node24:0.0.0","runAsUser":1000}}'
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 10m
              memory: 64Mi
