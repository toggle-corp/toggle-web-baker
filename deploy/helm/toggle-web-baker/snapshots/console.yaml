data:
  config.yaml: |
    metricsBindAddress: ":8080"
    healthProbeBindAddress: ":8081"
    leaderElect: true
    registryAllowlist:
    clusterCIDRs:
      - "10.0.0.0/8"
    traefikGroup: "traefik.io"
    traefikNamespace: "traefik"
    imagePullSecret: ""
    storageClass: ""
    measureInterval: "1h"
    images:
      clone: "ghcr.io/toggle-corp/toggle-web-baker-clone:0.0.0"
      copier: "ghcr.io/toggle-corp/toggle-web-baker-copier:0.0.0"
      du: "ghcr.io/toggle-corp/toggle-web-baker-du:0.0.0"
      cleanup: "ghcr.io/toggle-corp/toggle-web-baker-cleanup:0.0.0"
      clock: "ghcr.io/toggle-corp/toggle-web-baker-clock:0.0.0"
      nginx: "docker.io/nginxinc/nginx-unprivileged:1.27-alpine"
    nodeImages: {"18":{"image":"ghcr.io/toggle-corp/toggle-web-baker-node18:0.0.0","runAsUser":1000},"24":{"image":"ghcr.io/toggle-corp/toggle-web-baker-node24:0.0.0","runAsUser":1000}}
    phaseResources:
      cpu:
        request: "0.1"
        limit: "4"
      memory:
        setup: "512Mi"
        fetch: "512Mi"
        build: "2Gi"
    activeDeadlineSeconds: 1800

