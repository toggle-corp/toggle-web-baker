# Source: toggle-web-baker-helm/templates/console/ingress.yaml
# Single Ingress: all traffic for the console host reaches oauth2-proxy, which
# serves /oauth2/* itself (login + callback) and reverse-proxies every other
# request to the console upstream. Unauthenticated hits natively 302 to GitHub.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: release-name-toggle-web-baker-console
  namespace: default
  labels:
    helm.sh/chart: toggle-web-baker-helm-0.0.0
    app.kubernetes.io/name: toggle-web-baker
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "0.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: console
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  rules:
    - host: baker-console.example.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: release-name-toggle-web-baker-oauth2-proxy
                port: { number: 4180 }
  tls:
    - hosts: [baker-console.example.org]
      secretName: baker-console-tls
