# Source: toggle-web-baker-helm/templates/console/oauth2-proxy.yaml
# oauth2-proxy: GitHub OAuth reverse proxy in front of the console. Unauthenticated
# requests natively 302-redirect to GitHub login; authenticated requests are proxied
# to the console upstream. MUST FAIL CLOSED — any error confirming team membership
# denies the request.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-name-toggle-web-baker-oauth2-proxy
  namespace: default
  labels:
    helm.sh/chart: toggle-web-baker-helm-0.0.0
    app.kubernetes.io/name: toggle-web-baker
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "0.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: oauth2-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: toggle-web-baker
      app.kubernetes.io/instance: release-name
      app.kubernetes.io/component: oauth2-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: toggle-web-baker
        app.kubernetes.io/instance: release-name
        app.kubernetes.io/component: oauth2-proxy
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
          args:
            - --http-address=0.0.0.0:4180
            - --provider=github
            - --github-org=toggle-corp
            - --github-team=toggle-corp/platform-team
            - --email-domain=*
            - --scope=user:email read:org
            - --pass-user-headers=true
            - --reverse-proxy=true
            - --skip-provider-button=true
            - --cookie-secure=true
            - --cookie-name=_baker_console
            - --cookie-domain=baker-console.example.org
            - --redirect-url=https://baker-console.example.org/oauth2/callback
            - --whitelist-domain=baker-console.example.org
            - --upstream=http://release-name-toggle-web-baker-console.default.svc.cluster.local:80
            - --skip-auth-route=GET=^/signed-out$
            - --skip-auth-route=GET=^/healthz$
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom: { secretKeyRef: { name: baker-oauth2-proxy, key: client-id } }
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom: { secretKeyRef: { name: baker-oauth2-proxy, key: client-secret } }
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom: { secretKeyRef: { name: baker-oauth2-proxy, key: cookie-secret } }
          ports:
            - { name: http, containerPort: 4180 }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 32Mi
