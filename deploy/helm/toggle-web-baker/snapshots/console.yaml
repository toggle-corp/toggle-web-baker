# Source: toggle-web-baker-helm/templates/console/deployment.yaml
# The console Deployment + Service. Listens on :8080, serves HTML; auth is
# handled entirely by oauth2-proxy reverse-proxying in front of it. The console
# trusts the X-Forwarded-User header oauth2-proxy injects (--pass-user-headers).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-name-toggle-web-baker-console
  namespace: default
  labels:
    helm.sh/chart: toggle-web-baker-helm-0.0.0
    app.kubernetes.io/name: toggle-web-baker
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "0.0.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: console
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: toggle-web-baker
      app.kubernetes.io/instance: release-name
      app.kubernetes.io/component: console
  template:
    metadata:
      labels:
        app.kubernetes.io/name: toggle-web-baker
        app.kubernetes.io/instance: release-name
        app.kubernetes.io/component: console
    spec:
      serviceAccountName: release-name-toggle-web-baker-console
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: console
          image: ghcr.io/toggle-corp/toggle-web-baker-console:0.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8080 }
          env:
            - { name: LISTEN_ADDR, value: ":8080" }
            - { name: LOKI_URL, value: "http://loki.monitoring.svc:3100" }
            - { name: LOKI_TENANT_ID, value: "baker" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 20
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 32Mi
