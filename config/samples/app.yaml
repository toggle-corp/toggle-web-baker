# e2e smoke App used by `just e2e-local`.
#
# A minimal, fast, hermetic-ish sample that exercises the full build pipeline
# (clone -> setup no-op -> fetch no-op -> build -> copier) without touching the
# network beyond the public Hello-World clone:
#
#   * setup + fetch are omitted on purpose -> the operator no-ops them (["true"]).
#   * the build just writes a static index.html, so there is no package install.
#   * no `secrets:` block -> satisfies the CEL rule that secrets require a
#     fetch.command, and keeps the smoke run credential-free.
#   * nodeVersion: 18 selects the operator-managed node18 image — the operator
#     supplies the digest-pinned image, its numeric UID (1000) and HOME, so the
#     app sets no build.image/runAsUser and no registry allowlist is needed
#     (managed images are allowlist-exempt). This is the DEFAULT path; the BYO
#     image+runAsUser path is covered by controller unit tests instead.
#
# Passes the CRD CEL validation: build.command present, image via nodeVersion.
apiVersion: baker.toggle-corp.com/v1alpha1
kind: App
metadata:
  name: smoke
  namespace: default
spec:
  repo: https://github.com/octocat/Hello-World
  ref: master
  group: mapswipe  # informational label the console uses to group/filter apps
  scheduledBuilds:      # opt-in; enabled is REQUIRED when the struct is present
    enabled: true
    schedule: "0 6 * * *"   # omit to use the operator's defaultSchedule
  watchCommits:         # opt-in commit polling; rebuilds when the ref's SHA changes
    enabled: true
    interval: 5m            # omit to use the operator's defaultWatchInterval
  keepReleases: 2
  ingress:
    host: smoke.local.test
    className: nginx
  pipeline:
    packageManager: yarn
    nodeVersion: 18   # operator-managed toolchain (image + UID + HOME); no build.image needed
    # setup + fetch omitted on purpose -> operator no-ops them (["true"]).
    phases:
      build:
        command: ["sh", "-c", "mkdir -p out && printf '<h1>smoke ok</h1>' > out/index.html"]
        outputDir: out
