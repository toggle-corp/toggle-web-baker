name: CI

on:
  pull_request:
  push:
    branches: [main]
  # Reused by release.yml on tag push to also publish images + chart.
  workflow_call:
    inputs:
      docker_push:
        description: Push built images to GHCR.
        type: boolean
        default: false
      helm_push:
        description: Package and push the Helm chart to GHCR (OCI).
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  GO_VERSION: "1.26"
  IMAGE_PREFIX: ghcr.io/toggle-corp/toggle-web-baker
  CHART_DIR: deploy/helm/toggle-web-baker
  # Chart name => OCI repo segment: helm push lands at
  # ghcr.io/toggle-corp/toggle-web-baker-helm.
  CHART_NAME: toggle-web-baker-helm
  CHART_OCI_REPO: oci://ghcr.io/toggle-corp

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: extractions/setup-just@v2
      - uses: dcarbone/install-yq-action@v1
      - name: Build
        run: just build
      - name: Test
        run: just test
      - name: Image shell tests
        run: |
          make -C images test
          make -C images shellcheck
      - name: Image set drift check
        # Fail if the image set on disk drifts from the CI matrix, the
        # release-body loop, or the chart values.yaml refs. Needs yq (above).
        run: bash images/check-images.sh
      - name: Envtest (CRD validation)
        run: just test-envtest
      - name: Lint (operator module)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
      - name: Lint (console module)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: console

  docker_build:
    # Gate publishing on a green build: nothing pushes unless tests/lint pass.
    needs: build-test-lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: operator, context: ".", file: Dockerfile }
          - { name: console, context: console, file: console/Dockerfile }
          - { name: clone, context: images/clone, file: images/clone/Dockerfile }
          - { name: copier, context: images/copier, file: images/copier/Dockerfile }
          - { name: du, context: images/du, file: images/du/Dockerfile }
          - { name: cleanup, context: images/cleanup, file: images/cleanup/Dockerfile }
          - { name: clock, context: images/clock, file: images/clock/Dockerfile }
          - { name: node18, context: images/node18, file: images/node18/Dockerfile, content_tag: true }
          - { name: node24, context: images/node24, file: images/node24/Dockerfile, content_tag: true }
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: docker/setup-buildx-action@v3
      # Node images are tagged by a content hash of their Dockerfile (stable
      # across releases unless the Dockerfile changes, so the cluster only
      # re-pulls on a real change); every other image uses the release tag, or
      # ci-dryrun off a non-tag build. See images/content-tag.sh.
      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ matrix.content_tag }}" = "true" ]; then
            value="$(bash images/content-tag.sh '${{ matrix.name }}')"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            value="${{ github.ref_name }}"
          else
            value="ci-dryrun"
          fi
          echo "value=$value" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        if: ${{ inputs.docker_push }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # A content-tagged image whose tag already exists in GHCR is byte-identical
      # (same Dockerfile hash), so skip the rebuild+push to save Actions minutes.
      - name: Skip if already published
        id: skip
        if: ${{ inputs.docker_push && matrix.content_tag }}
        run: |
          ref="${{ env.IMAGE_PREFIX }}-${{ matrix.name }}:${{ steps.tag.outputs.value }}"
          if docker buildx imagetools inspect "$ref" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$ref already published; skipping build."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build${{ inputs.docker_push && ' and push' || ' (dry-run)' }} ${{ matrix.name }}
        # Skipped steps report an empty output, so non-content-tagged images
        # (skip step never ran) always build.
        if: ${{ steps.skip.outputs.exists != 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          # On push/PR triggers `inputs` is null, so `inputs.docker_push` renders
          # as an empty string — coerce to a real boolean or the action errors.
          push: ${{ inputs.docker_push || false }}
          tags: ${{ env.IMAGE_PREFIX }}-${{ matrix.name }}:${{ steps.tag.outputs.value }}

  helm_validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dcarbone/install-yq-action@v1
      - uses: azure/setup-helm@v4
      - name: Lint chart
        run: helm lint ${{ env.CHART_DIR }}
      - name: Template chart
        run: helm template ${{ env.CHART_DIR }} >/dev/null
      - name: Check helm snapshots
        # Snapshots guard against template drift. On a release tag the chart
        # version/appVersion (and the image tags + helm.sh/chart label derived
        # from them) are bumped, so a diff against the 0.0.0 golden snapshots is
        # expected — skip the check on tags rather than fail every release.
        if: ${{ github.ref_type != 'tag' }}
        run: ./${{ env.CHART_DIR }}/update-snapshots.sh --check-diff-only
      - name: Verify chart version matches tag
        if: ${{ inputs.helm_push && github.ref_type == 'tag' }}
        run: |
          chart_version="$(yq '.version' ${{ env.CHART_DIR }}/Chart.yaml)"
          if [ "$chart_version" != "${{ github.ref_name }}" ]; then
            echo "::error::Chart.yaml version ($chart_version) != tag (${{ github.ref_name }})"
            exit 1
          fi
  # Publish the chart only AFTER every image is pushed, so an installer never
  # pulls a chart whose image tags don't exist yet. `needs: docker_build` waits
  # for all matrix legs; build-test-lint is transitively required through
  # docker_build, so nothing publishes unless the build is green.
  helm_publish:
    needs: [docker_build, helm_validate]
    if: ${{ inputs.helm_push }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: azure/setup-helm@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Package and push chart
        run: |
          helm package ${{ env.CHART_DIR }} --destination /tmp/chart
          helm push /tmp/chart/${{ env.CHART_NAME }}-*.tgz ${{ env.CHART_OCI_REPO }}
